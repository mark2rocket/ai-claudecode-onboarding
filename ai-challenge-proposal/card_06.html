<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Card 06 - Day 3</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1080px; height: 1350px;
  background: #111111;
  position: relative; padding: 72px;
  display: flex; flex-direction: column;
  font-family: 'Noto Sans KR', sans-serif; overflow: hidden;
}
.badge { position: absolute; top: 52px; right: 60px; background: #3D3D3D; color: #fff; font-size: 22px; font-weight: 700; padding: 10px 22px; border-radius: 100px; }
.top-bar { width: 80px; height: 8px; background: #1A50E0; border-radius: 4px; margin-bottom: 52px; }
.day-label { font-family: 'Black Han Sans', sans-serif; font-size: 40px; color: #1A50E0; margin-bottom: 16px; }
.impact-title { font-family: 'Black Han Sans', sans-serif; font-size: 88px; line-height: 1.1; color: #FFFFFF; margin-bottom: 52px; }
.mcp-explain {
  background: rgba(255,255,255,0.06);
  border-radius: 16px; padding: 32px 36px; margin-bottom: 44px;
}
.mcp-row { display: flex; align-items: center; gap: 24px; margin-bottom: 0; }
.mcp-icon { font-size: 48px; }
.mcp-text-wrap {}
.mcp-title { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.mcp-desc { font-size: 24px; color: rgba(255,255,255,0.55); line-height: 1.5; }
.body-list { flex: 1; display: flex; flex-direction: column; justify-content: center; margin-bottom: 36px; }
.body-item { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 32px; }
.item-dot { width: 8px; height: 8px; background: #1A50E0; border-radius: 50%; margin-top: 16px; flex-shrink: 0; }
.item-content { flex: 1; }
.item-strong { display: block; font-size: 30px; font-weight: 700; color: #FFFFFF; margin-bottom: 6px; }
.item-text { font-size: 25px; color: rgba(255,255,255,0.6); line-height: 1.6; }
.prompt-box {
  background: #1A1A1A; border-left: 4px solid #1A50E0;
  border-radius: 0 12px 12px 0; padding: 22px 28px; margin-bottom: 36px;
  font-size: 27px; color: rgba(255,255,255,0.85); font-weight: 700;
  line-height: 1.5;
}
.wow-box { background: rgba(26,80,224,0.15); border: 1.5px solid rgba(26,80,224,0.4); border-radius: 14px; padding: 22px 30px; margin-bottom: 36px; }
.wow-label { font-size: 20px; font-weight: 700; color: #1A50E0; letter-spacing: 0.1em; margin-bottom: 8px; }
.wow-text { font-size: 27px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1.5; }
.footer { display: flex; justify-content: space-between; align-items: center; padding-top: 28px; border-top: 1.5px solid rgba(255,255,255,0.12); }
.footer-left { display: flex; align-items: center; gap: 16px; }
.profile-circle { width: 52px; height: 52px; background: #1A50E0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 20px; }
.profile-name { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.8); }
.handle { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="card">
  <div class="badge">6/10</div>
  <div class="top-bar"></div>
  <div class="day-label">Day 3. Gmail 연결</div>
  <div class="impact-title">메일함을 AI가<br>직접 읽어요</div>
  <div class="mcp-explain">
    <div class="mcp-row">
      <div class="mcp-icon">🔌</div>
      <div class="mcp-text-wrap">
        <div class="mcp-title">MCP = 외부 도구 연결 방법</div>
        <div class="mcp-desc">Claude Code에 Gmail, Slack, Notion 등<br>실제 업무 도구를 연결해요</div>
      </div>
    </div>
  </div>
  <div class="body-list">
    <div class="body-item">
      <div class="item-dot"></div>
      <div class="item-content">
        <span class="item-strong">Gmail MCP 설치 (명령어 1줄)</span>
        <span class="item-text">설치 후 Claude가 메일함 직접 접근해요</span>
      </div>
    </div>
    <div class="body-item">
      <div class="item-dot"></div>
      <div class="item-content">
        <span class="item-strong">요약 + 답장 초안까지 자동</span>
        <span class="item-text">읽고 → 정리하고 → 초안 써줘요</span>
      </div>
    </div>
  </div>
  <div class="prompt-box">
    💬 "오늘 중요한 메일 요약해줘"
  </div>
  <div class="wow-box">
    <div class="wow-label">⚡ WOW 모멘트</div>
    <div class="wow-text">메일 처리 시간 70% 절감 체험</div>
  </div>
  <div class="footer">
    <div class="footer-left">
      <div class="profile-circle">M</div>
      <div class="profile-name">mkt.chef.ai</div>
    </div>
    <div class="handle">@mkt.chef.ai</div>
  </div>
</div>
</body>
</html>
