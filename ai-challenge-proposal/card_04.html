<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Card 04 - Day 1</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1080px; height: 1350px;
  background: #111111;
  position: relative;
  padding: 72px;
  display: flex; flex-direction: column;
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
}
.badge {
  position: absolute; top: 52px; right: 60px;
  background: #3D3D3D; color: #fff;
  font-size: 22px; font-weight: 700;
  padding: 10px 22px; border-radius: 100px;
}
.top-bar { width: 80px; height: 8px; background: #1A50E0; border-radius: 4px; margin-bottom: 52px; }

.day-label {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 40px; color: #1A50E0;
  letter-spacing: 0.02em; margin-bottom: 16px;
}
.impact-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 88px; line-height: 1.1; color: #FFFFFF;
  margin-bottom: 56px; letter-spacing: -0.01em;
}

.body-list { flex: 1; display: flex; flex-direction: column; justify-content: center; margin-bottom: 44px; }
.body-item {
  display: flex; align-items: flex-start; gap: 24px;
  margin-bottom: 36px;
}
.item-dot {
  width: 8px; height: 8px;
  background: #1A50E0; border-radius: 50%;
  margin-top: 16px; flex-shrink: 0;
}
.item-content { flex: 1; }
.item-strong {
  display: block;
  font-size: 32px; font-weight: 700; color: #FFFFFF;
  margin-bottom: 6px; line-height: 1.4;
}
.item-text {
  font-size: 26px; color: rgba(255,255,255,0.62);
  line-height: 1.6;
}

.wow-box {
  background: rgba(26,80,224,0.15);
  border: 1.5px solid rgba(26,80,224,0.4);
  border-radius: 14px;
  padding: 24px 32px;
  margin-bottom: 44px;
}
.wow-label {
  font-size: 20px; font-weight: 700; color: #1A50E0;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 10px;
}
.wow-text {
  font-size: 28px; font-weight: 700; color: rgba(255,255,255,0.85);
  line-height: 1.5;
}

.footer {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 32px; border-top: 1.5px solid rgba(255,255,255,0.12);
}
.footer-left { display: flex; align-items: center; gap: 16px; }
.profile-circle {
  width: 52px; height: 52px; background: #1A50E0;
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; color: white; font-weight: 900; font-size: 20px;
}
.profile-name { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.8); }
.handle { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="card">
  <div class="badge">4/10</div>
  <div class="top-bar"></div>
  <div class="day-label">Day 1. AI 비서 입사일</div>
  <div class="impact-title">CLAUDE.md 한 장이<br>AI 비서 계약서예요</div>
  <div class="body-list">
    <div class="body-item">
      <div class="item-dot"></div>
      <div class="item-content">
        <span class="item-strong">Claude Code 설치</span>
        <span class="item-text">터미널에서 5분이면 끝나요</span>
      </div>
    </div>
    <div class="body-item">
      <div class="item-dot"></div>
      <div class="item-content">
        <span class="item-strong">CLAUDE.md 작성 = 업무 지시서</span>
        <span class="item-text">"내 이름은 OOO, 주로 마케팅 업무를 해"</span>
      </div>
    </div>
    <div class="body-item">
      <div class="item-dot"></div>
      <div class="item-content">
        <span class="item-strong">한 번 저장하면 매번 기억해요</span>
        <span class="item-text">다음부터 Claude가 알아서 맥락 파악</span>
      </div>
    </div>
  </div>
  <div class="wow-box">
    <div class="wow-label">⚡ WOW 모멘트</div>
    <div class="wow-text">터미널에서 내 이름 부르는 AI<br>첫 경험을 하게 돼요</div>
  </div>
  <div class="footer">
    <div class="footer-left">
      <div class="profile-circle">M</div>
      <div class="profile-name">mkt.chef.ai</div>
    </div>
    <div class="handle">@mkt.chef.ai</div>
  </div>
</div>
</body>
</html>
