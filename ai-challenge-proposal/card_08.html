<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Card 08 - Day 5</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1080px; height: 1350px;
  background: #111111;
  position: relative; padding: 72px;
  display: flex; flex-direction: column;
  font-family: 'Noto Sans KR', sans-serif; overflow: hidden;
}
.badge { position: absolute; top: 52px; right: 60px; background: #3D3D3D; color: #fff; font-size: 22px; font-weight: 700; padding: 10px 22px; border-radius: 100px; }
.top-bar { width: 80px; height: 8px; background: #1A50E0; border-radius: 4px; margin-bottom: 52px; }
.day-label { font-family: 'Black Han Sans', sans-serif; font-size: 40px; color: #1A50E0; margin-bottom: 16px; }
.impact-title { font-family: 'Black Han Sans', sans-serif; font-size: 88px; line-height: 1.1; color: #FFFFFF; margin-bottom: 48px; }
.skill-list { margin-bottom: 40px; }
.skill-row {
  display: flex; align-items: center; gap: 20px;
  padding: 20px 24px; border-radius: 12px;
  margin-bottom: 16px; background: rgba(255,255,255,0.05);
}
.skill-cmd {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 30px; color: #1A50E0;
  background: rgba(26,80,224,0.15);
  padding: 8px 20px; border-radius: 8px;
  white-space: nowrap;
}
.skill-desc { font-size: 26px; color: rgba(255,255,255,0.7); }
.body-list { flex: 1; display: flex; flex-direction: column; justify-content: center; margin-bottom: 32px; }
.body-item { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 28px; }
.item-dot { width: 8px; height: 8px; background: #1A50E0; border-radius: 50%; margin-top: 14px; flex-shrink: 0; }
.item-content { flex: 1; }
.item-strong { display: block; font-size: 29px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }
.item-text { font-size: 24px; color: rgba(255,255,255,0.58); line-height: 1.5; }
.wow-box { background: rgba(26,80,224,0.15); border: 1.5px solid rgba(26,80,224,0.4); border-radius: 14px; padding: 22px 30px; margin-bottom: 36px; }
.wow-label { font-size: 20px; font-weight: 700; color: #1A50E0; letter-spacing: 0.1em; margin-bottom: 8px; }
.wow-text { font-size: 27px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1.5; }
.footer { display: flex; justify-content: space-between; align-items: center; padding-top: 28px; border-top: 1.5px solid rgba(255,255,255,0.12); }
.footer-left { display: flex; align-items: center; gap: 16px; }
.profile-circle { width: 52px; height: 52px; background: #1A50E0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 20px; }
.profile-name { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.8); }
.handle { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="card">
  <div class="badge">8/10</div>
  <div class="top-bar"></div>
  <div class="day-label">Day 5. 시스템 완성</div>
  <div class="impact-title">퇴근 후에도<br>혼자 돌아가는 AI</div>
  <div class="skill-list">
    <div class="skill-row">
      <div class="skill-cmd">/보고서</div>
      <div class="skill-desc">주제만 입력하면 완성</div>
    </div>
    <div class="skill-row">
      <div class="skill-cmd">/메일요약</div>
      <div class="skill-desc">오늘 메일 자동 정리</div>
    </div>
    <div class="skill-row">
      <div class="skill-cmd">/경쟁사분석</div>
      <div class="skill-desc">브랜드명만 넣으면 끝</div>
    </div>
  </div>
  <div class="body-list">
    <div class="body-item">
      <div class="item-dot"></div>
      <div class="item-content">
        <span class="item-strong">Day 1~4 자동화를 스킬로 패키징</span>
        <span class="item-text">한 줄 명령으로 반복 실행해요</span>
      </div>
    </div>
    <div class="body-item">
      <div class="item-dot"></div>
      <div class="item-content">
        <span class="item-strong">퇴근 후 실행 → 다음 날 아침 완성</span>
        <span class="item-text">자는 동안 AI가 일해요</span>
      </div>
    </div>
  </div>
  <div class="wow-box">
    <div class="wow-label">⚡ WOW 모멘트</div>
    <div class="wow-text">내 이름의 AI 비서 시스템 완성</div>
  </div>
  <div class="footer">
    <div class="footer-left">
      <div class="profile-circle">M</div>
      <div class="profile-name">mkt.chef.ai</div>
    </div>
    <div class="handle">@mkt.chef.ai</div>
  </div>
</div>
</body>
</html>
