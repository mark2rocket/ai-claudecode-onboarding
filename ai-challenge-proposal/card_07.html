<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Card 07 - Day 4</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1080px; height: 1350px;
  background: #111111;
  position: relative; padding: 72px;
  display: flex; flex-direction: column;
  font-family: 'Noto Sans KR', sans-serif; overflow: hidden;
}
.badge { position: absolute; top: 52px; right: 60px; background: #3D3D3D; color: #fff; font-size: 22px; font-weight: 700; padding: 10px 22px; border-radius: 100px; }
.top-bar { width: 80px; height: 8px; background: #1A50E0; border-radius: 4px; margin-bottom: 52px; }
.day-label { font-family: 'Black Han Sans', sans-serif; font-size: 40px; color: #1A50E0; margin-bottom: 16px; }
.impact-title { font-family: 'Black Han Sans', sans-serif; font-size: 88px; line-height: 1.1; color: #FFFFFF; margin-bottom: 48px; }
.compare {
  display: flex; gap: 20px; margin-bottom: 44px;
}
.cmp-box { flex: 1; background: rgba(255,255,255,0.06); border-radius: 14px; padding: 28px 24px; }
.cmp-box.active { background: rgba(26,80,224,0.18); border: 1.5px solid #1A50E0; }
.cmp-label { font-size: 20px; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); margin-bottom: 12px; }
.cmp-box.active .cmp-label { color: #1A50E0; }
.cmp-time { font-family: 'Black Han Sans', sans-serif; font-size: 52px; color: #fff; margin-bottom: 8px; }
.cmp-desc { font-size: 23px; color: rgba(255,255,255,0.5); }
.agents-row { display: flex; gap: 16px; margin-bottom: 44px; }
.agent-box {
  flex: 1; background: rgba(255,255,255,0.05);
  border-radius: 14px; padding: 24px 20px; text-align: center;
}
.agent-icon { font-size: 36px; margin-bottom: 10px; }
.agent-name { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.agent-role { font-size: 20px; color: rgba(255,255,255,0.5); }
.sim-label {
  text-align: center; font-size: 22px; color: #1A50E0; font-weight: 700;
  letter-spacing: 0.05em; margin-bottom: 28px;
}
.wow-box { background: rgba(26,80,224,0.15); border: 1.5px solid rgba(26,80,224,0.4); border-radius: 14px; padding: 22px 30px; margin-bottom: 36px; }
.wow-label { font-size: 20px; font-weight: 700; color: #1A50E0; letter-spacing: 0.1em; margin-bottom: 8px; }
.wow-text { font-size: 26px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1.5; }
.footer { display: flex; justify-content: space-between; align-items: center; padding-top: 28px; border-top: 1.5px solid rgba(255,255,255,0.12); }
.footer-left { display: flex; align-items: center; gap: 16px; }
.profile-circle { width: 52px; height: 52px; background: #1A50E0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 20px; }
.profile-name { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.8); }
.handle { font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="card">
  <div class="badge">7/10</div>
  <div class="top-bar"></div>
  <div class="day-label">Day 4. AI 3명 동시</div>
  <div class="impact-title">병렬 에이전트가<br>화면에서 일해요</div>
  <div class="compare">
    <div class="cmp-box">
      <div class="cmp-label">순차 실행</div>
      <div class="cmp-time">30분</div>
      <div class="cmp-desc">1명씩 차례로</div>
    </div>
    <div class="cmp-box active">
      <div class="cmp-label">⚡ 병렬 실행</div>
      <div class="cmp-time">10분</div>
      <div class="cmp-desc">3명 동시에</div>
    </div>
  </div>
  <div class="sim-label">▼ 동시에 작동하는 에이전트 3개</div>
  <div class="agents-row">
    <div class="agent-box">
      <div class="agent-icon">🔍</div>
      <div class="agent-name">리서치</div>
      <div class="agent-role">자료 수집</div>
    </div>
    <div class="agent-box">
      <div class="agent-icon">📊</div>
      <div class="agent-name">분석</div>
      <div class="agent-role">인사이트 도출</div>
    </div>
    <div class="agent-box">
      <div class="agent-icon">✍️</div>
      <div class="agent-name">초안 작성</div>
      <div class="agent-role">문서화</div>
    </div>
  </div>
  <div class="wow-box">
    <div class="wow-label">⚡ WOW 모멘트</div>
    <div class="wow-text">AI 팀이 내 눈앞에서 협업하는 장면</div>
  </div>
  <div class="footer">
    <div class="footer-left">
      <div class="profile-circle">M</div>
      <div class="profile-name">mkt.chef.ai</div>
    </div>
    <div class="handle">@mkt.chef.ai</div>
  </div>
</div>
</body>
</html>
