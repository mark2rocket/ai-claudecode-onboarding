<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Card 09 - Verified</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1080px; height: 1350px;
  background: #FFFFFF;
  position: relative; padding: 72px;
  display: flex; flex-direction: column;
  font-family: 'Noto Sans KR', sans-serif; overflow: hidden;
}
.badge { position: absolute; top: 52px; right: 60px; background: #3D3D3D; color: #fff; font-size: 22px; font-weight: 700; padding: 10px 22px; border-radius: 100px; }
.top-bar { width: 80px; height: 8px; background: #1A50E0; border-radius: 4px; margin-bottom: 48px; }
.main-title { font-family: 'Black Han Sans', sans-serif; font-size: 88px; line-height: 1.08; color: #111; margin-bottom: 12px; }
.sub { font-size: 30px; font-weight: 700; color: #888; margin-bottom: 52px; }
.pass-list { flex: 1; display: flex; flex-direction: column; gap: 24px; margin-bottom: 44px; }
.pass-item {
  display: flex; align-items: flex-start; gap: 24px;
  background: #F7F9FF; border-radius: 16px; padding: 30px 32px;
  border: 1.5px solid #E8EEFF;
}
.check-icon {
  width: 44px; height: 44px; min-width: 44px;
  background: #1A50E0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 22px; font-weight: 900;
  margin-top: 2px;
}
.pass-content {}
.pass-name { font-size: 26px; font-weight: 900; color: #111; margin-bottom: 6px; }
.pass-reason { font-size: 23px; color: #555; line-height: 1.5; }
.bottom-punch {
  background: #111;
  border-radius: 16px; padding: 30px 36px;
  font-size: 28px; font-weight: 700; color: #fff;
  line-height: 1.6; margin-bottom: 36px; text-align: center;
}
.bottom-punch span { color: #1A50E0; }
.footer { display: flex; justify-content: space-between; align-items: center; padding-top: 28px; border-top: 1.5px solid #E5E5E5; }
.footer-left { display: flex; align-items: center; gap: 16px; }
.profile-circle { width: 52px; height: 52px; background: #1A50E0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 20px; }
.profile-name { font-size: 24px; font-weight: 700; color: #111; }
.handle { font-size: 24px; font-weight: 700; color: #888; }
</style>
</head>
<body>
<div class="card">
  <div class="badge">9/10</div>
  <div class="top-bar"></div>
  <div class="main-title">4인 전문가<br>전원 통과</div>
  <div class="sub">실제로 검증했어요</div>
  <div class="pass-list">
    <div class="pass-item">
      <div class="check-icon">✓</div>
      <div class="pass-content">
        <div class="pass-name">Lenny Rachitsky</div>
        <div class="pass-reason">WOW 모멘트 설계 검증 — Day별 감탄 포인트 명확</div>
      </div>
    </div>
    <div class="pass-item">
      <div class="check-icon">✓</div>
      <div class="pass-content">
        <div class="pass-name">Anthropic CTO</div>
        <div class="pass-reason">기술 정확도 검증 — Claude Code 동작 방식 정확</div>
      </div>
    </div>
    <div class="pass-item">
      <div class="check-icon">✓</div>
      <div class="pass-content">
        <div class="pass-name">비개발자 IT 직장인</div>
        <div class="pass-reason">실무 적용성 확인 — 즉시 따라할 수 있는 난이도</div>
      </div>
    </div>
    <div class="pass-item">
      <div class="check-icon">✓</div>
      <div class="pass-content">
        <div class="pass-name">한국 에듀테크 창업자</div>
        <div class="pass-reason">한국 시장 적합성 검증 — 직장인 니즈 정확히 반영</div>
      </div>
    </div>
  </div>
  <div class="bottom-punch">코딩 몰라도 돼요. <span>검증됐어요.</span></div>
  <div class="footer">
    <div class="footer-left">
      <div class="profile-circle">M</div>
      <div class="profile-name">mkt.chef.ai</div>
    </div>
    <div class="handle">@mkt.chef.ai</div>
  </div>
</div>
</body>
</html>
