<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Card 02 - Problem</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 1080px;
  height: 1350px;
  background: #FFFFFF;
  position: relative;
  padding: 72px;
  display: flex;
  flex-direction: column;
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
}
.badge {
  position: absolute;
  top: 52px;
  right: 60px;
  background: #3D3D3D;
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  padding: 10px 22px;
  border-radius: 100px;
}
.top-bar { width: 80px; height: 8px; background: #1A50E0; border-radius: 4px; margin-bottom: 48px; }
.main-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 96px;
  line-height: 1.08;
  color: #111;
  margin-bottom: 16px;
}
.sub {
  font-size: 32px;
  font-weight: 700;
  color: #888;
  margin-bottom: 64px;
}
.stat-box {
  background: #F0F4FF;
  border-left: 6px solid #1A50E0;
  padding: 36px 40px;
  border-radius: 0 16px 16px 0;
  margin-bottom: 44px;
}
.stat-num {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 72px;
  color: #1A50E0;
  line-height: 1;
  margin-bottom: 10px;
}
.stat-desc {
  font-size: 28px;
  color: #444;
  font-weight: 700;
}
.list { flex: 1; }
.list-item {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 32px;
}
.dot {
  width: 10px;
  height: 10px;
  background: #1A50E0;
  border-radius: 50%;
  margin-top: 14px;
  flex-shrink: 0;
}
.list-text {
  font-size: 30px;
  color: #333;
  line-height: 1.6;
}
.list-text strong { color: #111; font-weight: 900; }
.punch {
  background: #111;
  color: #fff;
  font-size: 30px;
  font-weight: 700;
  padding: 28px 36px;
  border-radius: 16px;
  line-height: 1.6;
  margin-bottom: 40px;
}
.punch span { color: #1A50E0; }
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 32px;
  border-top: 1.5px solid #E5E5E5;
}
.footer-left { display: flex; align-items: center; gap: 16px; }
.profile-circle {
  width: 52px; height: 52px;
  background: #1A50E0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 900; font-size: 20px;
}
.profile-name { font-size: 24px; font-weight: 700; color: #111; }
.handle { font-size: 24px; font-weight: 700; color: #888; }
</style>
</head>
<body>
<div class="card">
  <div class="badge">2/10</div>
  <div class="top-bar"></div>
  <div class="main-title">지금 이 상황</div>
  <div class="sub">아는데도 못 바꾸고 있잖아요</div>
  <div class="stat-box">
    <div class="stat-num">35%</div>
    <div class="stat-desc">한국 직장인 하루 업무의 반복·단순 작업 비율</div>
  </div>
  <div class="list">
    <div class="list-item">
      <div class="dot"></div>
      <div class="list-text">이메일 처리, 보고서 정리, 자료 조사</div>
    </div>
    <div class="list-item">
      <div class="dot"></div>
      <div class="list-text"><strong>다 AI로 자동화할 수 있어요</strong></div>
    </div>
    <div class="list-item">
      <div class="dot"></div>
      <div class="list-text">근데 "코딩 몰라서" 못 하고 있죠</div>
    </div>
  </div>
  <div class="punch">코딩 없이 <span>5일</span>만에 바꿔볼게요.</div>
  <div class="footer">
    <div class="footer-left">
      <div class="profile-circle">M</div>
      <div class="profile-name">mkt.chef.ai</div>
    </div>
    <div class="handle">@mkt.chef.ai</div>
  </div>
</div>
</body>
</html>
